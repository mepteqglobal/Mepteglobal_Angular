<main class="page-shell" id="top">

      <img class="nav-logo" src="assets\images\favicon.png" alt="Mepteq Logo" />
      <span class="brand-text">Mepteq</span>
    </a>
    <button
      class="menu-toggle"
      type="button"
      aria-label="Toggle navigation"
      aria-controls="primary-nav"
      [attr.aria-expanded]="menuOpen"
      (click)="toggleMenu()"
    >
      <span aria-hidden="true">{{ menuOpen ? '×' : '☰' }}</span>
    </button>
    <nav class="nav-links" [class.open]="menuOpen" id="primary-nav" aria-label="Primary navigation">
      @for (link of navLinks; track link.label) {
        <a [href]="link.path" (click)="closeMenu()" [class.highlight]="link.highlight">
          @if (link.icon) {
            <span class="nav-icon">{{ link.icon }}</span>
          }
          {{ link.label }}
        </a>
      }
    </nav>
