<section id="partners" class="partners-section page-section">
  <div class="section-head partners-head">
    <span class="section-label light-label">OUR CLIENTS &amp; PARTNERS</span>
    <h2>Trusted by leading brands across industries.</h2>
  </div>

  <div class="partner-grid">
    <div class="partner-card" *ngFor="let p of partnerItems">
      <ng-container *ngIf="p.logo; else nameLabel">
        <img [src]="p.logo" [alt]="p.name" />
      </ng-container>
      <ng-template #nameLabel>
        <span class="partner-name">{{ p.name }}</span>
      </ng-template>
    </div>
  </div>
</section>
